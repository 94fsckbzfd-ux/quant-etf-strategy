name: "\U0001F4C8 V8.8 ETF\u52A8\u91CF\u8F6E\u52A8 - \u6BCF\u5468\u4E94\u81EA\u52A8\u4FE1\u53F7"

on:
  schedule:
    - cron: '45 6 * * 5'
  workflow_dispatch:
    inputs:
      strategy:
        description: '策略模式 (final 或 pure)'
        required: false
        default: 'final'
        type: choice
        options:
          - final
          - pure

jobs:
  run-signal:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: "\U0001F4E5 Checkout repository"
        uses: actions/checkout@v4

      - name: "\U0001F40D Setup Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: "\U0001F4E6 Install dependencies"
        run: |
          pip install --upgrade pip
          pip install pandas numpy akshare requests

      - name: "\U0001F680 Run strategy signal engine"
        id: run_signal
        run: |
          STRATEGY="${{ github.event.inputs.strategy || 'final' }}"
          echo "Running strategy: $STRATEGY"
          python v8_live_signal.py --strategy $STRATEGY 2>&1 | tee signal_output.txt
          echo "strategy=$STRATEGY" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: "\U0001F4CB Extract signal summary"
        id: extract
        run: |
          python3 - <<'EOF'
          import os
          with open("signal_output.txt", "r", encoding="utf-8") as f:
              content = f.read()
          lines = content.split("\n")
          summary_lines = []
          capture = False
          for line in lines:
              if "V8.8 LIVE DASHBOARD" in line:
                  capture = True
              if capture:
                  summary_lines.append(line)
          if summary_lines:
              summary = "\n".join(summary_lines)
          else:
              summary = content[-2000:] if len(content) > 2000 else content
          with open("signal_summary.txt", "w", encoding="utf-8") as f:
              f.write(summary)
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write("summary<<SUMMARY_EOF\n")
              f.write(summary[:3000])
              f.write("\nSUMMARY_EOF\n")
          print(f"Summary length: {len(summary)} chars")
          EOF

      - name: "\U0001F4BE Commit updated portfolio state"
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions Bot"
          git add portfolio_state.json
          if git diff --staged --quiet; then
            echo "No changes to portfolio_state.json"
          else
            git commit -m "🤖 Auto-update portfolio_state.json [$(date '+%Y-%m-%d %H:%M')]"
            git push
          fi

      - name: "\U0001F4CE Upload signal output as artifact"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: signal-output-${{ github.run_number }}-${{ steps.run_signal.outputs.strategy }}
          path: |
            signal_output.txt
            signal_summary.txt
            portfolio_state.json
          retention-days: 30

      - name: "\U0001F4F1 Send WeChat notification via PushPlus"
        if: always()
        run: |
          # 构建推送内容（HTML格式）
          STRATEGY="${{ steps.run_signal.outputs.strategy }}"
          RUN_NUMBER="${{ github.run_number }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # 读取信号摘要
          SUMMARY=$(cat signal_summary.txt 2>/dev/null || echo "信号摘要读取失败")

          # 构建 HTML 内容
          CONTENT="<h3>V8.8 跨资产ETF动量轮动系统 - 本周信号</h3>"
          CONTENT="${CONTENT}<p><b>运行编号：</b>#${RUN_NUMBER}</p>"
          CONTENT="${CONTENT}<p><b>策略模式：</b>${STRATEGY}</p>"
          CONTENT="${CONTENT}<hr>"
          CONTENT="${CONTENT}<pre style='font-size:12px;line-height:1.4;white-space:pre-wrap;word-wrap:break-word;'>"
          CONTENT="${CONTENT}$(echo "$SUMMARY" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')"
          CONTENT="${CONTENT}</pre>"
          CONTENT="${CONTENT}<hr>"
          CONTENT="${CONTENT}<p>完整输出请在 <a href='${RUN_URL}'>GitHub Actions Artifacts</a> 中下载查看。</p>"
          CONTENT="${CONTENT}<p><b>提示：</b>请在周五 14:45-15:00 之间执行下单，先 SELL 后 BUY。</p>"

          # 调用 PushPlus API 发送微信推送
          RESPONSE=$(curl -s -X POST "http://www.pushplus.plus/send" \
            -H "Content-Type: application/json" \
            -d "{
              \"token\": \"${{ secrets.PUSHPLUS_TOKEN }}\",
              \"title\": \"📈 V8.8 ETF轮动信号 | ${STRATEGY} 模式 | 第${RUN_NUMBER}期\",
              \"content\": $(echo "$CONTENT" | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read()))'),
              \"template\": \"html\"
            }")

          echo "PushPlus Response: $RESPONSE"

          # 检查返回状态
          CODE=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.loads(sys.stdin.read()).get('code', 'unknown'))" 2>/dev/null || echo "parse_error")
          if [ "$CODE" = "200" ]; then
            echo "✅ 微信推送发送成功"
          else
            echo "⚠️ 微信推送可能失败，返回码: $CODE"
            echo "完整响应: $RESPONSE"
          fi
