name: "📈 V8.7.1 ETF动量轮动 - 每周五自动信号"

on:
  schedule:
    - cron: '45 6 * * 5'
  workflow_dispatch:
    inputs:
      strategy:
        description: '策略模式 (final 或 pure)'
        required: false
        default: 'final'
        type: choice
        options:
          - final
          - pure

jobs:
  run-signal:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4

      - name: "🐍 Setup Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: "📦 Install dependencies"
        run: |
          pip install --upgrade pip
          pip install pandas numpy akshare requests

      - name: "🚀 Run strategy signal engine"
        id: run_signal
        # 👇 在这里将 GitHub Secrets 中的 Token 传递给 Python 环境
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: |
          STRATEGY="${{ github.event.inputs.strategy || 'final' }}"
          echo "Running strategy: $STRATEGY"
          # 注意：请确保此处运行的 Python 文件名与您仓库里的文件名一致
          # 如果您依然叫 v8_live_signal.py，请把下方改成 v8_live_signal.py
          python v8.7.1_live_signal.py --strategy $STRATEGY 2>&1 | tee signal_output.txt
          echo "strategy=$STRATEGY" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: "📋 Extract signal summary"
        id: extract
        run: |
          python3 - <<'EOF'
          import os
          with open("signal_output.txt", "r", encoding="utf-8") as f:
              content = f.read()
          lines = content.split("\n")
          summary_lines = []
          capture = False
          for line in lines:
              if "LIVE DASHBOARD" in line:  # 优化：兼容 V8.7.1 标题
                  capture = True
              if capture:
                  summary_lines.append(line)
          if summary_lines:
              summary = "\n".join(summary_lines)
          else:
              summary = content[-2000:] if len(content) > 2000 else content
          with open("signal_summary.txt", "w", encoding="utf-8") as f:
              f.write(summary)
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write("summary<<SUMMARY_EOF\n")
              f.write(summary[:3000])
              f.write("\nSUMMARY_EOF\n")
          print(f"Summary length: {len(summary)} chars")
          EOF

      - name: "💾 Commit updated portfolio state"
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions Bot"
          git add portfolio_state.json
          if git diff --staged --quiet; then
            echo "No changes to portfolio_state.json"
          else
            git commit -m "🤖 Auto-update portfolio_state.json [$(date '+%Y-%m-%d %H:%M')]"
            git push
          fi

      - name: "📎 Upload signal output as artifact"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: signal-output-${{ github.run_number }}-${{ steps.run_signal.outputs.strategy }}
          path: |
            signal_output.txt
            signal_summary.txt
            portfolio_state.json
          retention-days: 30
